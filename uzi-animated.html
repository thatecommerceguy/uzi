<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UZI — Click to Fire</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: crosshair;
    user-select: none;
    font-family: 'Orbitron', monospace;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Ambient background grain */
  .scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 30% 60%, rgba(237,85,100,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 40%, rgba(170,178,188,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .uzi-container {
    position: relative;
    z-index: 2;
    transition: transform 0.05s ease;
  }

  .uzi-container.recoil {
    animation: recoil 0.08s ease-out;
  }

  @keyframes recoil {
    0% { transform: translate(0, 0) rotate(0deg); }
    30% { transform: translate(-6px, -3px) rotate(-2deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  .uzi-svg {
    width: 320px;
    height: 320px;
    filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
    transform: rotate(-30deg);
  }

  /* Muzzle flash */
  .muzzle-flash {
    position: absolute;
    top: -10px;
    right: -60px;
    width: 120px;
    height: 120px;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
    transform: rotate(-30deg);
  }

  .muzzle-flash.fire {
    animation: flash 0.1s ease-out;
  }

  @keyframes flash {
    0% { opacity: 1; transform: rotate(-30deg) scale(0.5); }
    50% { opacity: 0.9; transform: rotate(-30deg) scale(1.2); }
    100% { opacity: 0; transform: rotate(-30deg) scale(0.8); }
  }

  /* Shell casings */
  .shell {
    position: absolute;
    width: 6px;
    height: 14px;
    background: linear-gradient(135deg, #d4a332 40%, #b8860b 60%);
    border-radius: 2px 2px 1px 1px;
    z-index: 5;
    pointer-events: none;
  }

  /* Bullet holes on background */
  .bullet-hole {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle, #111 40%, #333 70%, transparent 100%);
    box-shadow: 0 0 6px 2px rgba(237,85,100,0.3), inset 0 0 3px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 1;
    animation: holeAppear 0.15s ease-out forwards;
  }

  @keyframes holeAppear {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.4); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Bullet tracer */
  .tracer {
    position: absolute;
    width: 30px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,220,100,0.9), rgba(255,160,50,0));
    pointer-events: none;
    z-index: 8;
    border-radius: 1px;
  }

  /* HUD */
  .hud {
    position: fixed;
    top: 30px;
    left: 30px;
    z-index: 100;
    color: #ed5564;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .hud .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 8px;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 30px rgba(237,85,100,0.4);
  }

  .hud .subtitle {
    margin-top: 4px;
    color: #aab2bc;
  }

  .ammo-counter {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 100;
    text-align: right;
  }

  .ammo-counter .label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #656d78;
    text-transform: uppercase;
  }

  .ammo-counter .count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: #ed5564;
    text-shadow: 0 0 20px rgba(237,85,100,0.5);
    transition: color 0.1s;
  }

  .ammo-counter .count.low {
    animation: ammoWarn 0.5s infinite;
  }

  @keyframes ammoWarn {
    0%, 100% { color: #ed5564; }
    50% { color: #da4453; text-shadow: 0 0 40px rgba(237,85,100,0.8); }
  }

  .ammo-counter .max {
    font-size: 18px;
    color: #434a54;
  }

  .reload-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: #ed5564;
    letter-spacing: 6px;
    opacity: 0;
    pointer-events: none;
    z-index: 200;
    text-shadow: 0 0 30px rgba(237,85,100,0.6);
  }

  .reload-msg.show {
    animation: reloadPulse 1.5s ease-in-out;
  }

  @keyframes reloadPulse {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  .instructions {
    position: fixed;
    bottom: 30px;
    left: 30px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #434a54;
    text-transform: uppercase;
    z-index: 100;
  }

  /* Screen shake */
  .scene.shake {
    animation: shake 0.08s ease;
  }

  @keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(-2px, 1px); }
    50% { transform: translate(2px, -1px); }
    75% { transform: translate(-1px, -1px); }
    100% { transform: translate(0,0); }
  }

  /* Spark particles */
  .spark {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #ffdc64;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9;
  }
</style>
</head>

<script>
  const scene = document.getElementById('scene');
  const uzi = document.getElementById('uziContainer');
  const flash = document.getElementById('muzzleFlash');
  const ammoEl = document.getElementById('ammoCount');
  const reloadMsg = document.getElementById('reloadMsg');

  let ammo = 32;
  const maxAmmo = 32;
  let firing = false;
  let fireInterval = null;
  let reloading = false;
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  // Synthesize gunshot sound
  function playGunshot() {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // Noise burst for the shot crack
    const bufferSize = ctx.sampleRate * 0.08;
    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
    }

    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;

    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.6, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);

    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = 3000;
    noiseFilter.Q.value = 0.5;

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ctx.destination);
    noise.start(now);
    noise.stop(now + 0.08);

    // Low thump
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.06);

    const oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(0.8, now);
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

    osc.connect(oscGain);
    oscGain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.06);

    // Metallic click
    const click = ctx.createOscillator();
    click.type = 'square';
    click.frequency.setValueAtTime(800 + Math.random() * 400, now);

    const clickGain = ctx.createGain();
    clickGain.gain.setValueAtTime(0.15, now);
    clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.02);

    click.connect(clickGain);
    clickGain.connect(ctx.destination);
    click.start(now);
    click.stop(now + 0.02);
  }

  function playEmpty() {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 600;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.1, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.04);
  }

  function playReload() {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // Magazine slide
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.linearRampToValueAtTime(400, now + 0.15);
    osc.frequency.linearRampToValueAtTime(600, now + 0.2);

    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.15, now + 0.05);
    g.gain.setValueAtTime(0.15, now + 0.15);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

    const f = ctx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.value = 1200;
    f.Q.value = 2;

    osc.connect(f);
    f.connect(g);
    g.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.3);

    // Click
    setTimeout(() => {
      const ctx2 = getAudioCtx();
      const n = ctx2.currentTime;
      const c = ctx2.createOscillator();
      c.type = 'square';
      c.frequency.value = 1500;
      const cg = ctx2.createGain();
      cg.gain.setValueAtTime(0.2, n);
      cg.gain.exponentialRampToValueAtTime(0.001, n + 0.03);
      c.connect(cg);
      cg.connect(ctx2.destination);
      c.start(n);
      c.stop(n + 0.03);
    }, 400);
  }

  function updateAmmo() {
    ammoEl.textContent = ammo;
    if (ammo <= 5) {
      ammoEl.classList.add('low');
    } else {
      ammoEl.classList.remove('low');
    }
  }

  function spawnShell() {
    const shell = document.createElement('div');
    shell.className = 'shell';
    const uziRect = uzi.getBoundingClientRect();
    shell.style.left = (uziRect.left + uziRect.width * 0.45) + 'px';
    shell.style.top = (uziRect.top + uziRect.height * 0.35) + 'px';

    const vx = -3 + Math.random() * -4;
    const vy = -6 + Math.random() * -3;
    const rot = Math.random() * 720;

    scene.appendChild(shell);

    let x = 0, y = 0, frame = 0;
    const gravity = 0.5;
    let velY = vy;

    function animShell() {
      x += vx;
      velY += gravity;
      y += velY;
      frame++;
      shell.style.transform = `translate(${x}px, ${y}px) rotate(${rot * (frame / 30)}deg)`;
      if (frame < 40) {
        requestAnimationFrame(animShell);
      } else {
        shell.remove();
      }
    }
    requestAnimationFrame(animShell);
  }

  function spawnTracer(e) {
    const tracer = document.createElement('div');
    tracer.className = 'tracer';
    const uziRect = uzi.getBoundingClientRect();
    const startX = uziRect.right - 40;
    const startY = uziRect.top + 20;

    const angle = Math.atan2(e.clientY - startY, e.clientX - startX);

    tracer.style.left = startX + 'px';
    tracer.style.top = startY + 'px';
    tracer.style.transform = `rotate(${angle}rad)`;
    scene.appendChild(tracer);

    let dist = 0;
    function animTracer() {
      dist += 40;
      tracer.style.left = (startX + Math.cos(angle) * dist) + 'px';
      tracer.style.top = (startY + Math.sin(angle) * dist) + 'px';
      tracer.style.opacity = 1 - dist / 600;
      if (dist < 600) {
        requestAnimationFrame(animTracer);
      } else {
        tracer.remove();
      }
    }
    requestAnimationFrame(animTracer);
  }

  function spawnBulletHole(e) {
    const hole = document.createElement('div');
    hole.className = 'bullet-hole';
    const spread = 20;
    hole.style.left = (e.clientX + (Math.random() - 0.5) * spread) + 'px';
    hole.style.top = (e.clientY + (Math.random() - 0.5) * spread) + 'px';
    scene.appendChild(hole);
    setTimeout(() => hole.remove(), 8000);
  }

  function spawnSparks(e) {
    for (let i = 0; i < 4; i++) {
      const spark = document.createElement('div');
      spark.className = 'spark';
      spark.style.left = e.clientX + 'px';
      spark.style.top = e.clientY + 'px';

      const vx = (Math.random() - 0.5) * 10;
      const vy = (Math.random() - 0.5) * 10;
      scene.appendChild(spark);

      let x = 0, y = 0, frame = 0;
      function animSpark() {
        x += vx;
        y += vy + frame * 0.3;
        frame++;
        spark.style.transform = `translate(${x}px, ${y}px)`;
        spark.style.opacity = 1 - frame / 15;
        if (frame < 15) {
          requestAnimationFrame(animSpark);
        } else {
          spark.remove();
        }
      }
      requestAnimationFrame(animSpark);
    }
  }

  function fire(e) {
    if (reloading) return;

    if (ammo <= 0) {
      playEmpty();
      return;
    }

    ammo--;
    updateAmmo();
    playGunshot();

    // Recoil
    uzi.classList.remove('recoil');
    void uzi.offsetWidth;
    uzi.classList.add('recoil');

    // Muzzle flash
    flash.classList.remove('fire');
    void flash.offsetWidth;
    flash.classList.add('fire');

    // Screen shake
    scene.classList.remove('shake');
    void scene.offsetWidth;
    scene.classList.add('shake');

    // Effects
    spawnShell();
    spawnTracer(e);
    spawnBulletHole(e);
    spawnSparks(e);
  }

  function startFiring(e) {
    if (reloading) return;
    firing = true;
    fire(e);
    let lastE = e;
    document.addEventListener('mousemove', (ev) => { lastE = ev; });
    fireInterval = setInterval(() => {
      if (ammo > 0) {
        fire(lastE);
      } else {
        stopFiring();
        playEmpty();
      }
    }, 75); // ~800 RPM
  }

  function stopFiring() {
    firing = false;
    if (fireInterval) {
      clearInterval(fireInterval);
      fireInterval = null;
    }
  }

  function reload() {
    if (reloading || ammo === maxAmmo) return;
    reloading = true;
    stopFiring();

    playReload();

    reloadMsg.classList.remove('show');
    void reloadMsg.offsetWidth;
    reloadMsg.classList.add('show');

    setTimeout(() => {
      ammo = maxAmmo;
      updateAmmo();
      reloading = false;
    }, 1500);
  }

  // Event listeners
  scene.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startFiring(e);
  });

  document.addEventListener('mouseup', stopFiring);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') reload();
  });

  // Touch support
  scene.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    startFiring({ clientX: touch.clientX, clientY: touch.clientY });
  }, { passive: false });

  document.addEventListener('touchend', stopFiring);
</script>
</body>
</html>
